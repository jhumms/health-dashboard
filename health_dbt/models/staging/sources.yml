version: 2

sources:
  - name: raw
    database: health_db
    schema: raw
    tables:
      - name: oura_sleep
        description: Oura full sleep sessions with HRV and heart rate (one long_sleep per day)
        loaded_at_field: pulled_at
        freshness:
          warn_after: {count: 2, period: day}
          error_after: {count: 7, period: day}

      - name: oura_daily_sleep
        description: Oura daily sleep scores (one row per day)
        loaded_at_field: pulled_at
        freshness:
          warn_after: {count: 2, period: day}
          error_after: {count: 7, period: day}

      - name: oura_daily_readiness
        description: Oura daily readiness scores (one row per day)
        loaded_at_field: pulled_at
        freshness:
          warn_after: {count: 2, period: day}
          error_after: {count: 7, period: day}

      - name: oura_daily_activity
        description: Oura daily activity metrics (one row per day)
        loaded_at_field: pulled_at
        freshness:
          warn_after: {count: 2, period: day}
          error_after: {count: 7, period: day}

      - name: oura_workout
        description: Oura-detected workout sessions (running, walking, cycling, etc.)
        loaded_at_field: pulled_at
        freshness:
          warn_after: {count: 2, period: day}
          error_after: {count: 7, period: day}

      - name: manual_runs
        description: Manually logged runs (distance, duration, pace) entered via chat
        loaded_at_field: logged_at
        freshness:
          warn_after: {count: 30, period: day}
          error_after: {count: 90, period: day}

      - name: daylio_logs
        description: Daylio mood journal entries (one row per day)
        loaded_at_field: pulled_at
        freshness:
          warn_after: {count: 7, period: day}
          error_after: {count: 30, period: day}

      - name: daily_strength_session
        description: Daily Strength workout sessions (one row per workout)
        loaded_at_field: pulled_at
        freshness:
          warn_after: {count: 7, period: day}
          error_after: {count: 30, period: day}

      - name: weather_daily
        description: Daily weather from Open-Meteo with hourly AM/PM breakdowns
        loaded_at_field: pulled_at
        freshness:
          warn_after: {count: 2, period: day}
          error_after: {count: 5, period: day}
